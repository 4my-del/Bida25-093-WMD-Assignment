<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Sweet Cravings Bakery</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Star rating icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

      <a class="navbar-brand" href="index.html">Sweet Cravings Bakery</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="promotions.html">Promotions</a></li>
          <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

        </ul>
      </div>

    </div>
  </nav>
</header>

<!-- MAIN -->
<main class="container my-5">

  <h1 class="text-center mb-4">Customer Feedback</h1>

  <form>

    <!-- NAME -->
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" required>
    </div>

    <!-- EMAIL (OPTIONAL) -->
    <div class="mb-3">
      <label class="form-label">Email (optional)</label>
      <input type="email" class="form-control">
    </div>

    <!-- COMMENT -->
    <div class="mb-3">
      <label class="form-label">Your Comment</label>
      <textarea class="form-control" rows="4" required></textarea>
    </div>

    <!-- STAR RATING -->
    <div class="mb-3">
      <label class="form-label">Rate your experience</label><br>

      <div class="star-rating">
        <input type="radio" name="rating" value="5" id="star5"><label for="star5"><i class="fa fa-star"></i></label>
        <input type="radio" name="rating" value="4" id="star4"><label for="star4"><i class="fa fa-star"></i></label>
        <input type="radio" name="rating" value="3" id="star3"><label for="star3"><i class="fa fa-star"></i></label>
        <input type="radio" name="rating" value="2" id="star2"><label for="star2"><i class="fa fa-star"></i></label>
        <input type="radio" name="rating" value="1" id="star1"><label for="star1"><i class="fa fa-star"></i></label>
      </div>

    </div>

    <!-- RECOMMENDATION -->
    <div class="mb-3">
      <label class="form-label">Would you recommend us?</label>
      <select class="form-select" required>
        <option value="">Choose an option</option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>

    <!-- SUBMIT -->
    <button type="submit" class="btn btn-primary">Submit Feedback</button>

  </form>

</main>

<!-- FOOTER -->
<footer class="text-center bg-light p-3">
  <p>&copy; 2026 Sweet Cravings Bakery. Designed by Amy Mokgadi.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
